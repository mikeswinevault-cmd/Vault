<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Wine Vault</title>
    <style>
        :root { --accent: #722f37; --bg: #fdfaf6; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); padding: 20px; padding-bottom: 180px; margin: 0; max-width: 600px; margin: auto; display: none; }
        header { text-align: center; margin-bottom: 20px; }
        .store-logo { max-width: 150px; margin-bottom: 15px; display: none; margin-left: auto; margin-right: auto; border-radius: 8px; }
        .version-tag { font-size: 10px; color: #bbb; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .search-bar { width: 100%; padding: 14px; border-radius: 25px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 20px; font-size: 16px; outline: none; }
        
        .wine-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); border-top: 6px solid var(--accent); position: relative; }
        .wine-name { font-weight: bold; display: block; font-size: 1.2em; color: #1a1a1a; margin-bottom: 8px; padding-right: 90px; }
        
        /* Links Row */
        .link-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .db-link { color: #0066cc; font-size: 0.85em; text-decoration: none; }
        .desc-trigger { color: #007AFF; font-size: 0.85em; text-decoration: underline; font-weight: bold; cursor: pointer; border: none; background: none; padding: 0; }

        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-toggle { flex: 1; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; cursor: pointer; font-size: 1em; }
        .active-like { background-color: #2e7d32 !important; color: white !important; font-weight: bold; }
        .active-maybe { background-color: #f9a825 !important; color: white !important; font-weight: bold; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; background: #fff; min-height: 80px; resize: none; outline: none; }
        
        /* Descriptor Modal Styling */
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display:none; z-index:2000; align-items:center; justify-content:center; padding: 20px; box-sizing: border-box; }
        .modal-card { background: white; border-radius: 15px; width: 100%; max-width: 500px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-header { font-weight: bold; font-size: 1.3em; margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .data-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .data-item { font-size: 14px; line-height: 1.4; }
        .data-label { font-weight: bold; display: block; text-transform: uppercase; font-size: 10px; color: #888; letter-spacing: 0.5px; }
        .btn-close { width: 100%; padding: 15px; background: #eee; border: none; border-radius: 10px; margin-top: 25px; font-weight: bold; cursor: pointer; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 12px; max-width: 600px; margin: auto; }
        .btn-email { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; flex: 2; font-weight: bold; font-size: 1.1em; cursor: pointer; }
        .btn-copy { background: #eee; color: #444; border: none; padding: 18px; border-radius: 12px; flex: 1; font-weight: bold; font-size: 0.9em; cursor: pointer; }
    </style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div id="modal-wine-name" class="modal-header">Wine Details</div>
        <div id="modal-data" class="data-grid"></div>
        <button class="btn-close" onclick="closeModal()">Return to Vault</button>
    </div>
</div>

<div id="app-content">
    <header>
        <img id="logo" class="store-logo" src="" alt="Logo">
        <h1 id="store-name-display" style="color:var(--accent); margin:0;">Vault</h1>
        <div class="version-tag">Engine v28.0</div>
        <input type="text" id="search" oninput="render()" class="search-bar" placeholder="🔍 Search wines...">
    </header>

    <div id="container"></div>

    <div class="footer">
        <div class="btn-group">
            <button class="btn-copy" onclick="copyToClipboard()">📋 Copy</button>
            <button class="btn-email" onclick="sendEmail()">📧 Email Report</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const SHEET_KEY = urlParams.get('id');
    const SETTINGS_GID = '1010402997'; 
    const DESCRIPTORS_GID = '458806725';

    let wineList = [];
    let state = {};
    let descriptorsMap = {};
    let descHeaders = [];

    async function init() {
        if (!SHEET_KEY) return;
        await loadData();
        document.body.style.display = 'block';
    }

    function parseCSV(text) {
        return text.split(/\r?\n/).map(row => {
            return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
        });
    }

    async function loadData() {
        try {
            const wineText = await (await fetch(`https://docs.google.com/spreadsheets/d/e/${SHEET_KEY}/pub?output=csv&gid=0&cb=${Date.now()}`)).text();
            wineList = parseCSV(wineText).slice(1).filter(cols => cols[0]).map((cols, i) => ({
                id: "w_" + i, name: cols[0], link: cols[1] || ""
            }));

            const setRes = await fetch(`https://docs.google.com/spreadsheets/d/e/${SHEET_KEY}/pub?output=csv&gid=${SETTINGS_GID}&cb=${Date.now()}`);
            if(setRes.ok) {
                const settings = {};
                parseCSV(await setRes.text()).forEach(cols => { if (cols[0] && cols[1]) settings[cols[0]] = cols[1]; });
                //if (settings['Store Name']) document.getElementById('store-name-display').innerText = settings['Store Name'];
                // Apply Branding
            if (settings['Store Name']) {
                storeName = settings['Store Name'];
                // 1. Update the Header on the page
                document.getElementById('store-name-display').innerText = storeName;
                // 2. Update the actual Browser Tab name immediately
                document.title = storeName + " Vault"; 
                // 3. (Optional) Update the internal page title element
                document.getElementById('page-title').innerText = storeName + " Vault";
            }
                if (settings['Accent Color']) document.documentElement.style.setProperty('--accent', settings['Accent Color']);
                if (settings['Logo URL']) {
                    const img = document.getElementById('logo');
                    img.src = settings['Logo URL']; img.style.display = 'block';
                }
            }

            const descRes = await fetch(`https://docs.google.com/spreadsheets/d/e/${SHEET_KEY}/pub?output=csv&gid=${DESCRIPTORS_GID}&cb=${Date.now()}`);
            if (descRes.ok) {
                const descData = parseCSV(await descRes.text());
                descHeaders = descData[0].slice(2, 8); // C1:H1 (Viticultural, Vines, Oak, etc.)
                descData.slice(1).forEach(cols => {
                    if (cols[0]) descriptorsMap[cols[0].toLowerCase()] = cols.slice(2, 8);
                });
            }

            state = JSON.parse(localStorage.getItem('vault_' + SHEET_KEY)) || {};
            render();
        } catch (e) { console.error(e); }
    }

    function openDescriptors(wineName) {
        const data = descriptorsMap[wineName.toLowerCase()];
        if (!data) return;
        
        document.getElementById('modal-wine-name').innerText = wineName;
        let html = '';
        data.forEach((val, idx) => {
            if(val) {
                html += `<div class="data-item"><span class="data-label">${descHeaders[idx]}</span>${val}</div>`;
            }
        });
        document.getElementById('modal-data').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function render() {
        const term = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('container');
        let html = '';
        
        wineList.forEach(wine => {
            if (!wine.name.toLowerCase().includes(term)) return;
            const s = state[wine.id] || { s: null, n: "" };
            const hasDesc = descriptorsMap[wine.name.toLowerCase()];

            html += `
                <div class="wine-card">
                    <span class="wine-name">${wine.name}</span>
                    <div class="link-row">
                        <a href="${wine.link}" target="_blank" class="db-link">Details & Reorder →</a>
                        ${hasDesc ? `<button onclick="openDescriptors('${wine.name.replace(/'/g, "\\'")}')" class="desc-trigger">Descriptors →</button>` : ''}
                    </div>
                    <div class="toggle-group">
                        <button class="btn-toggle ${s.s === 'L' ? 'active-like' : ''}" onclick="saveChoice('${wine.id}','L')">👍 Like</button>
                        <button class="btn-toggle ${s.s === 'M' ? 'active-maybe' : ''}" onclick="saveChoice('${wine.id}','M')">🤔 Maybe</button>
                    </div>
                    <textarea oninput="saveNote('${wine.id}', this.value)" placeholder="Tasting notes...">${s.n}</textarea>
                </div>`;
        });
        container.innerHTML = html;
    }

    window.saveChoice = function(id, val) {
        if(!state[id]) state[id] = { s: null, n: "" };
        state[id].s = (state[id].s === val) ? null : val;
        localStorage.setItem('vault_' + SHEET_KEY, JSON.stringify(state));
        render();
    };

    window.saveNote = function(id, txt) {
        if(!state[id]) state[id] = { s: null, n: "" };
        state[id].n = txt;
        localStorage.setItem('vault_' + SHEET_KEY, JSON.stringify(state));
    };

    window.copyToClipboard = function() {
        let body = `MY TASTING REPORT\n\n`;
        wineList.forEach(wine => {
            const d = state[wine.id];
            if(d && (d.s || d.n)) {
                body += `🍷 ${wine.name.toUpperCase()}\nRATING: ${d.s==='L'?'LIKE':(d.s==='M'?'MAYBE':'NONE')}\nNOTE: ${d.n || '-'}\n\n`;
            }
        });
        navigator.clipboard.writeText(body).then(() => alert("Copied!"));
    }

    window.sendEmail = function() {
        let body = `MY TASTING REPORT\n\n`;
        wineList.forEach(wine => {
            const d = state[wine.id];
            if(d && (d.s || d.n)) {
                body += `🍷 ${wine.name.toUpperCase()}\nRATING: ${d.s==='L'?'LIKE':(d.s==='M'?'MAYBE':'NONE')}\nNOTE: ${d.n || '-'}\n\n`;
            }
        });
        window.location.href = `mailto:?subject=Tasting Notes&body=${encodeURIComponent(body)}`;
    };

    init();
</script>
</body>
</html>
